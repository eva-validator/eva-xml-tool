<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<title>EVA PRO MAX</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

<style>
body{background:#0a0f14;color:#fff;font-family:sans-serif;padding:20px}
h1{color:#FF6B00}
button{padding:12px;margin:5px;border:none;border-radius:8px;cursor:pointer;background:#FF6B00;color:#fff}
.box{margin-top:15px;padding:15px;border:1px solid #333;border-radius:10px}
textarea{width:100%;height:200px;background:#111;color:#0f0;padding:10px}
#aiBox{display:none;background:#062}
</style>
</head>

<body>

<h1>🔥 EVA PRO MAX</h1>

<input type="file" id="excel">

<br>

<button onclick="convert()">Excel → XML</button>
<button onclick="validate()">Валідація</button>
<button onclick="runAI()">🤖 AI</button>

<div id="stats" class="box"></div>
<textarea id="xml"></textarea>

<div id="aiBox" class="box">
  <b>🤖 AI:</b>
  <pre id="ai"></pre>
</div>

<script>

let data=[], xml='';

// LOAD
document.getElementById('excel').onchange=e=>{
  const f=e.target.files[0];
  const r=new FileReader();
  r.onload=x=>{
    const wb=XLSX.read(x.target.result,{type:'array'});
    const ws=wb.Sheets[wb.SheetNames[0]];
    data=XLSX.utils.sheet_to_json(ws,{defval:''});
    stats();
  };
  r.readAsArrayBuffer(f);
};

// STATS
function stats(){
  let brands=new Set();
  data.forEach(r=>brands.add(r['Бренд']));
  document.getElementById('stats').innerHTML=
    `📦 ${data.length} товарів<br>🏷 ${brands.size} брендів`;
}

// CONVERT
function convert(){
  let out=`<yml_catalog><shop><offers>`;
  let ok=0, skip=0;

  data.forEach(r=>{
    if(!r['Offer ID']||!r['Цена']){skip++;return;}
    out+=`
<offer id="${r['Offer ID']}">
<price>${r['Цена']}</price>
<name_ua>${r['Название (украинский)']}</name_ua>
<vendor>${r['Бренд']||''}</vendor>
<categoryId>${r['ID Категории']||1}</categoryId>
<picture>${(r['Изображения']||'').split(',')[0]||''}</picture>
<description_ua>${r['Описание (украинский)']||''}</description_ua>
</offer>`;
    ok++;
  });

  out+=`</offers></shop></yml_catalog>`;
  xml=out;
  document.getElementById('xml').value=xml;

  document.getElementById('stats').innerHTML+=
    `<br>✔ ${ok} | ❌ ${skip}`;
}

// VALIDATE
function validate(){
  let e=[];
  if(!xml.includes('<price>')) e.push('price');
  if(!xml.includes('<name_ua>')) e.push('name');
  if(!xml.includes('<picture>')) e.push('image');

  alert(e.length?'❌ '+e.join(', '):'✅ OK');
}

// AI
async function runAI(){
  if(!xml)return alert('нема XML');

  aiBox.style.display='block';
  ai.innerText='⏳...';

  const r=await fetch('https://eva-validator.ppioltd.workers.dev/',{
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify({xml})
  });

  const d=await r.json();
  ai.innerText=d.result;
}

</script>

</body>
</html>
